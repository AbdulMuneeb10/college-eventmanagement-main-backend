# ── Server ──────────────────────────────────────
server.port=${PORT:8080}

# ── MySQL Database ───────────────────────────────
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/event_management?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:muneeb}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──────────────────────────────
spring.jpa.hibernate.ddl-auto=${JPA_DDL:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ── CORS (allow React frontend) ──────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}